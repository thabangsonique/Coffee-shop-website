<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap demo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container">
        <!-- crema logo -->
        <a class="navbar-brand" href="#"
          ><img
            src="./UI DESIGN/Assets/Group 27.png"
            style="height: 100px; width: auto"
            alt="Crema coffee logo"
        /></a>

        <!-- Toggle navbar icon-->
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div
          class="collapse navbar-collapse justify-content-center"
          id="navbarNav"
        >
          <div class="c-nav-pill">
            <ul class="navbar-nav fs-6 fw-light mx-auto text-uppercase">
              <li class="nav-item me-3">
                <a class="nav-link active" aria-current="page" href="#">Home</a>
              </li>
              <li class="nav-item me-3">
                <a class="nav-link" href="#">Coffee Menu</a>
              </li>
              <li class="nav-item me-3">
                <a class="nav-link" href="#">About Us</a>
              </li>
              <li class="nav-item me-3">
                <a class="nav-link" href="#">Contact Us</a>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </nav>

    <!-- HERO SECTION -->
    <main>
      <!-- hero section -->
      <section class="hero d-flex align-items-start">
        <!-- 12 col grid  -->
        <div class="container">
          <div class="row">
            <div class="col-lg-5">
              <div class="hero-contents d-flex flex-column gap-4">
                <h1 class="fw-bold">Great Coffee, Every Day</h1>
                <p>
                  Handcrafted coffee made fresh daily, served with speed, care,
                  and consistency.
                </p>
                <!-- cta buttons -->
                <div class="d-flex gap-5">
                  <a class="btn btn-light rounded-pill px-4 py-3">View Menu</a>
                  <a class="btn btn-light rounded-pill px-4 py-3">Visit US</a>
                </div>
              </div>
            </div>

            <!-- HERO IMAGE             -->
          </div>
        </div>
      </section>

      FEATURED DRINKS
      <section class="featured"></section>
    </main>

    <!-- FOOTER SECTION -->
    <footer></footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
